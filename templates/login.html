<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Health Assistant - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/login.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-heartbeat"></i>
                    <h1>Heart Health Assistant</h1>
                </div>
            </div>
            
            <div class="login-form">
                <div class="form-title">
                    <h2>Login</h2>
                    <p>Sign in to access the Heart Health Assistant</p>
                </div>
                
                <div id="error-message" class="error-message"></div>
                
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">
                            <i class="fas fa-user"></i>
                            Username
                        </label>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            Password
                        </label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    
                    <button type="submit">
                        <i class="fas fa-sign-in-alt"></i>
                        Login
                    </button>
                </form>
            </div>
            
            <div class="login-footer">
                <p>Heart Health Assistant &copy; 2025</p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', path='/js/login.js') }}"></script>
</body>
</html>
